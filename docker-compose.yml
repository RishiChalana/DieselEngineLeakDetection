version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:////app/backend/diesel_engine_predictor/db.sqlite3
      - DEBUG=false
      - SECRET_KEY=${SECRET_KEY:-change-this-in-production}
    volumes:
      - ./backend/diesel_engine_predictor/db.sqlite3:/app/backend/diesel_engine_predictor/db.sqlite3
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/user_auth/health/"]
      interval: 30s
      timeout: 10s
      retries: 3

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    ports:
      - "8501:8501"
    depends_on:
      - backend
