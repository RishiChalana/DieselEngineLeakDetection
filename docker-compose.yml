

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:////app/backend/diesel_engine_predictor/db.sqlite3
      - DEBUG=false
      - SECRET_KEY=${SECRET_KEY:-change-this-in-production}
      - PYTHONPATH=/app
    volumes:
      - ./backend/diesel_engine_predictor/db.sqlite3:/app/backend/diesel_engine_predictor/db.sqlite3
      - ./frontend:/app/frontend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/user_auth/health/"]
      interval: 30s
      timeout: 10s
      retries: 3

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    ports:
      - "8501:8501"
    depends_on:
      - backend

  # React frontend — Vite dev server (run manually, not containerised)
  # cd frontend && npm install && npm run dev → http://localhost:5173
  # Vite proxies /api and /user_auth to http://localhost:8000 (no CORS config needed)
  # WebSocket connects directly: ws://localhost:8000/ws/engine/?token=<tok>
